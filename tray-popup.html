<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stash Quick Add</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
        background: transparent;
        color: #0a0a0a;
        overflow: hidden;
        user-select: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #fafafa;
        }
        .input {
          background: rgba(255, 255, 255, 0.06);
          border-color: rgba(255, 255, 255, 0.08);
          color: #fafafa;
        }
        .input::placeholder {
          color: #737373;
        }
        .input:focus {
          border-color: rgba(255, 255, 255, 0.15);
        }
        .hint {
          color: #737373;
        }
        .drop-zone {
          border-color: rgba(255, 255, 255, 0.1);
        }
        .drop-zone.active {
          border-color: rgba(255, 255, 255, 0.3);
          background: rgba(255, 255, 255, 0.04);
        }
        .status {
          color: #a3a3a3;
        }
        .status.success {
          color: #34d67f;
        }
        .type-pill {
          background: rgba(255, 255, 255, 0.08);
          color: #a3a3a3;
        }
      }

      .popup {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        background: rgba(0, 0, 0, 0.03);
        font-family: inherit;
        font-size: 13px;
        color: inherit;
        outline: none;
        transition: border-color 150ms;
      }

      .input:focus {
        border-color: rgba(0, 0, 0, 0.12);
      }

      .input::placeholder {
        color: #a3a3a3;
      }

      .drop-zone {
        border: 1.5px dashed rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        padding: 12px;
        text-align: center;
        font-size: 11px;
        color: #a3a3a3;
        transition:
          border-color 150ms,
          background 150ms;
      }

      .drop-zone.active {
        border-color: rgba(0, 0, 0, 0.3);
        background: rgba(0, 0, 0, 0.02);
      }

      .bottom-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }

      .type-pill {
        font-size: 10px;
        font-family: 'SF Mono', 'Menlo', monospace;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.04);
        color: #737373;
      }

      .hint {
        font-size: 10px;
        color: #a3a3a3;
        font-family: 'SF Mono', 'Menlo', monospace;
      }

      .status {
        font-size: 11px;
        color: #737373;
        text-align: center;
        min-height: 16px;
        transition: color 200ms;
      }

      .status.success {
        color: #22c55e;
      }

      .status.error {
        color: #d44;
      }
    </style>
  </head>
  <body>
    <div class="popup" id="popup">
      <input
        class="input"
        id="input"
        type="text"
        placeholder="paste a URL or type a note..."
        autofocus
        spellcheck="false"
      />
      <div class="drop-zone" id="dropzone">drop image or link here</div>
      <div class="bottom-row">
        <span class="type-pill" id="typePill">note</span>
        <span class="hint">enter to save &middot; esc to close</span>
      </div>
      <div class="status" id="status"></div>
    </div>
    <script type="module" src="/src/tray-popup.ts"></script>
  </body>
</html>
