name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  desktop:
    name: Desktop Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle inputs
        run: npm run build:tauri

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
